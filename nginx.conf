##
# Production Nginx Reverse Proxy for Flask Enterprise Architecture
#
# Mounts into docker-compose.optimized.yml:
#   ./nginx.conf:/etc/nginx/nginx.conf:ro
#
# Upstream: Gunicorn on web:5000 (4 gevent workers)
##

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------------------------------------------------------------
    # Logging
    # ---------------------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ---------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens   off;          # Hide Nginx version

    # ---------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ---------------------------------------------------------------
    # Rate limiting zones
    # ---------------------------------------------------------------
    # General requests: 10 req/s per IP with burst of 20
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    # Login/auth: 5 req/s per IP (brute-force protection)
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/s;
    # API endpoints: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m     rate=30r/s;
    # Static assets: no limit (served from cache)

    # ---------------------------------------------------------------
    # Upstream — Gunicorn
    # ---------------------------------------------------------------
    upstream flask_app {
        server web:5000;
        keepalive 32;
    }

    # ---------------------------------------------------------------
    # Redirect HTTP -> HTTPS
    # ---------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Let health checks through on HTTP (load-balancer probes)
        location /monitoring/health {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
        }
        location /api/health/live {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
        }

        # Let's Encrypt ACME challenge (certbot webroot validation)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---------------------------------------------------------------
    # HTTPS server
    # ---------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name _;

        # ----- SSL certificates -----
        # Let's Encrypt (production):
        #   docker compose --profile production run certbot certonly \
        #     --webroot -w /var/www/certbot -d yourdomain.com
        # Self-signed (dev): ./scripts/generate_ssl_certs.sh
        #
        # Paths work for both: certbot writes to /etc/letsencrypt/live/
        # which is mounted at /etc/nginx/ssl via certbot_certs volume,
        # and self-signed certs go directly into ./ssl/
        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # ----- TLS hardening -----
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # ----- Security headers -----
        # These supplement (not duplicate) the Flask-level headers from
        # app/_bootstrap/security.py — Nginx adds transport-layer headers.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ----- Request size limit (matches Flask MAX_CONTENT_LENGTH = 16 MB) -----
        client_max_body_size 16m;

        # ----- Static files (served directly, bypass Gunicorn) -----
        # Compose mount: ./app/static:/usr/share/nginx/html/static:ro
        location /static/ {
            alias /usr/share/nginx/html/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /favicon.ico {
            alias /usr/share/nginx/html/static/favicon.ico;
            expires 30d;
            access_log off;
        }

        # ----- Upload directory (proxied — not volume-mounted for security) -----
        location /uploads/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            expires 1h;
            add_header Cache-Control "private";
        }

        # ----- Health / readiness probes -----
        location /monitoring/health {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }
        location /api/health/ {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            access_log off;
        }

        # ----- Prometheus metrics (internal only) -----
        location /metrics {
            limit_req zone=api burst=5 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ----- Auth endpoints (stricter rate limit) -----
        location /account/login {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /account/reset {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----- Docker preview containers -----
        # Preview containers are published on ephemeral host ports (9100+).
        # Route /docker-preview/<port>/... to the host-published container port.
        location ~ ^/docker-preview/([0-9]+)(/.*)$ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://host.docker.internal:$1$2$is_args$args;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ----- API routes -----
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            # Timeouts for long-running API calls (LLM, imports)
            proxy_connect_timeout 10s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        # ----- Default: all other routes -----
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ----- Error pages -----
        error_page 502 503 504 =500 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
            add_header Cache-Control "no-store" always;
        }
    }
}
