[pytest]
# Minimal configuration - fast and reliable
addopts = -v --tb=short
testpaths = tests
asyncio_mode = auto
base_url = http://127.0.0.1

markers =
    smoke: Smoke tests for critical paths
    e2e: End-to-end browser tests
    journey: End-to-end journey tests — one per user persona, CI-enforced gate
    journey_deploy: Deploy pipeline tests requiring live Docker/cloud infra — excluded from CI gate
    regression: Regression tests
    performance: Performance/timing tests
    slow: Tests that take longer than 30 seconds
    arch_quality: Golden architecture quality tests — 5 reference cases, CI variance measurement
    flow: Cross-journey flow tests spanning multiple pages and personas
    sidebar_load: Tier-1 sidebar health — every page loads without 500
    sidebar_north_star: Tier-2 sidebar health — meaningful content per domain
    sidebar_sweep: Tier-3 sidebar health — full single-pass diagnostic sweep

