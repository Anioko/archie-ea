{% extends "layouts/admin_base.html" %}
<!-- modal-a11y-ok -->

{% block title %}Definition of Done Templates{% endblock %}

{% block content %}
<div class="p-6 max-w-4xl mx-auto" x-data="dodTemplates()" x-init="init()">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-foreground">Definition of Done Templates</h1>
  </div>

  <!-- Scope Tabs -->
  <div class="flex border-b border-border mb-6" role="tablist" aria-label="DoD scope tabs">
    <template x-for="scope in scopes" :key="scope.key">
      <button
        role="tab"
        :id="`tab-${scope.key}`"
        :aria-selected="activeScope === scope.key"
        :aria-controls="`panel-${scope.key}`"
        @click="activeScope = scope.key"
        :class="activeScope === scope.key
          ? 'border-b-2 border-primary text-primary font-semibold'
          : 'text-muted-foreground hover:text-foreground'"
        class="px-5 py-3 text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-primary rounded-t"
        x-text="scope.label">
      </button>
    </template>
  </div>

  <!-- Tab Panels -->
  <template x-for="scope in scopes" :key="scope.key">
    <div
      role="tabpanel"
      :id="`panel-${scope.key}`"
      :aria-labelledby="`tab-${scope.key}`"
      x-show="activeScope === scope.key" x-cloak>

      <template x-if="getTemplate(scope.key)">
        <div class="bg-card border border-border rounded-lg shadow-sm p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-foreground"
                x-text="getTemplate(scope.key).name"></h2>
            <span class="text-xs text-muted-foreground">scope: <span x-text="scope.key"></span></span>
          </div>

          <!-- Criteria list -->
          <ul class="space-y-3 mb-4" role="list" aria-label="DoD criteria">
            <template x-for="(criterion, idx) in getTemplate(scope.key).criteria" :key="criterion.id">
              <li class="flex items-center gap-3 py-2 border-b border-border/50 last:border-0">
                <span class="flex-1 text-sm text-foreground" x-text="criterion.text"></span>
                <span
                  x-show="criterion.mandatory" x-cloak
                  class="px-2 py-0.5 text-xs font-medium bg-destructive/10 text-destructive rounded-full">
                  mandatory
                </span>
                <span
                  x-show="!criterion.mandatory" x-cloak
                  class="px-2 py-0.5 text-xs font-medium bg-muted text-muted-foreground rounded-full">
                  optional
                </span>
              </li>
            </template>
          </ul>

          <!-- Add criterion form -->
          <div x-show="addingTo === scope.key" x-cloak class="mt-4 p-3 bg-muted/50 rounded-lg">
            <div class="flex gap-2 mb-2">
              <input
                x-model="newCriterionText"
                type="text"
                placeholder="Criterion text"
                class="flex-1 px-3 py-2 border border-input bg-background rounded-md text-sm text-foreground focus:outline-none focus:ring-2 focus:ring-primary"
                @keydown.enter="addCriterion(scope.key)"
                :aria-label="`New criterion for ${scope.label}`"
              />
              <label class="flex items-center gap-1 text-sm text-muted-foreground">
                <input type="checkbox" x-model="newCriterionMandatory" class="rounded" />
                Mandatory
              </label>
            </div>
            <div class="flex gap-2">
              <button
                @click="addCriterion(scope.key)"
                class="px-3 py-1.5 bg-primary text-primary-foreground text-sm rounded hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary">
                Add
              </button>
              <button
                @click="addingTo = null; newCriterionText = ''; newCriterionMandatory = false"
                class="px-3 py-1.5 bg-muted text-muted-foreground text-sm rounded hover:bg-muted/80">
                Cancel
              </button>
            </div>
          </div>

          <button
            x-show="addingTo !== scope.key" x-cloak
            @click="addingTo = scope.key; newCriterionText = ''"
            class="mt-3 px-3 py-1.5 text-sm text-primary border border-primary/30 rounded hover:bg-primary/5 focus:outline-none focus:ring-2 focus:ring-primary">
            + Add criterion
          </button>
        </div>
      </template>

      <template x-if="!getTemplate(scope.key)">
        <div class="bg-muted border border-dashed border-border rounded-lg p-8 text-center">
          <p class="text-muted-foreground text-sm">No template found for this scope.</p>
        </div>
      </template>
    </div>
  </template>

  <!-- Status message -->
  <p x-show="statusMsg" x-text="statusMsg" x-cloak
     class="mt-4 text-sm text-emerald-600"
     role="status" aria-live="polite"></p>
</div>

<script>
function dodTemplates() {
  return {
    scopes: [
      { key: 'story', label: 'Story' },
      { key: 'sprint', label: 'Sprint' },
      { key: 'epic', label: 'Epic' },
    ],
    activeScope: 'story',
    templates: {{ templates | tojson }},
    addingTo: null,
    newCriterionText: '',
    newCriterionMandatory: false,
    statusMsg: '',

    init() {},

    getTemplate(scope) {
      return this.templates.find(t => t.scope === scope) || null;
    },

    addCriterion(scope) {
      let text = this.newCriterionText.trim();
      if (!text) return;
      let tmpl = this.getTemplate(scope);
      if (!tmpl) return;

      let newId = 'c' + Date.now();
      let updated = (tmpl.criteria || []).concat([{
        id: newId,
        text: text,
        mandatory: this.newCriterionMandatory,
      }]);

      let self = this;
      fetch('/api/dod/templates/' + tmpl.id + '/criteria', {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ criteria: updated }),
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          tmpl.criteria = data.criteria;
          self.addingTo = null;
          self.newCriterionText = '';
          self.newCriterionMandatory = false;
          self.statusMsg = 'Criterion added.';
          setTimeout(function() { self.statusMsg = ''; }, 2500);
        })
        .catch(function() {
          self.statusMsg = 'Failed to save criterion.';
        });
    },
  };
}
</script>
{% endblock %}
