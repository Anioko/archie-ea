{# Run Detection modal — strategy selection + threshold slider.
   Expects parent Alpine scope with: showDetectionModal, runDetection(strategy, threshold)
#}
<div x-show="showDetectionModal" x-cloak x-trap.noscroll="showDetectionModal"
     class="fixed inset-0 z-50 flex items-center justify-center"
     @keydown.escape.window="showDetectionModal = false"
     role="dialog" aria-modal="true" aria-labelledby="detection-modal-title">
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-black/50 transition-opacity" @click="showDetectionModal = false"></div>

    <!-- Panel -->
    <div class="relative z-10 w-full max-w-2xl rounded-xl border bg-card p-6 shadow-lg mx-4">
        <div class="flex items-center justify-between mb-6">
            <h2 id="detection-modal-title" class="text-lg font-semibold text-foreground">Run Duplicate Detection</h2>
            <button aria-label="Close" type="button" @click="showDetectionModal = false" class="rounded-md p-1 text-muted-foreground hover:text-foreground">
                <i data-lucide="x" class="h-5 w-5"></i>
            </button>
        </div>

        <!-- Strategy Cards -->
        <div class="grid grid-cols-3 gap-3 mb-6">
            <button type="button" @click="detectionStrategy = 'fast'"
                    :class="detectionStrategy === 'fast' ? 'border-primary bg-primary/5 ring-2 ring-primary/20' : 'border-border hover:border-primary/50'"
                    class="rounded-xl border p-4 text-left transition-all">
                <div class="font-bold text-sm mb-1">Fast</div>
                <p class="text-xs text-muted-foreground">Name-based matching with acronym expansion. Best for large portfolios.</p>
            </button>
            <button type="button" @click="detectionStrategy = 'hybrid'"
                    :class="detectionStrategy === 'hybrid' ? 'border-primary bg-primary/5 ring-2 ring-primary/20' : 'border-border hover:border-primary/50'"
                    class="rounded-xl border p-4 text-left transition-all">
                <div class="font-bold text-sm mb-1">Hybrid <span class="text-xs font-normal text-primary ml-1">Recommended</span></div>
                <p class="text-xs text-muted-foreground">Hash + fuzzy analysis. Balanced speed and accuracy.</p>
            </button>
            <button type="button" @click="detectionStrategy = 'enhanced'"
                    :class="detectionStrategy === 'enhanced' ? 'border-primary bg-primary/5 ring-2 ring-primary/20' : 'border-border hover:border-primary/50'"
                    class="rounded-xl border p-4 text-left transition-all">
                <div class="font-bold text-sm mb-1">Enhanced</div>
                <p class="text-xs text-muted-foreground">Multi-dimensional with business context. Most accurate.</p>
            </button>
        </div>

        <!-- Threshold Slider -->
        <div class="mb-6">
            <label class="block text-sm font-medium text-foreground mb-2">
                Similarity Threshold: <span class="text-primary" x-text="Math.round(detectionThreshold * 100) + '%'"></span>
            </label>
            <input type="range" min="0.3" max="1.0" step="0.05" x-model.number="detectionThreshold"
                   class="w-full h-2 rounded-lg appearance-none bg-muted cursor-pointer accent-primary">
            <div class="flex justify-between text-xs text-muted-foreground mt-1">
                <span>More results (30%)</span>
                <span>Fewer, exact (100%)</span>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3">
            <button type="button" @click="showDetectionModal = false"
                    class="px-4 py-2 text-sm font-medium rounded-md border border-border text-foreground hover:bg-muted">
                Cancel
            </button>
            <button type="button" @click="runDetection(detectionStrategy, detectionThreshold)"
                    :disabled="detectionLoading"
                    class="px-4 py-2 text-sm font-medium rounded-md bg-primary text-primary-foreground hover:bg-primary/90 disabled:opacity-50">
                <span x-show="!detectionLoading" x-cloak>Run Detection</span>
                <span x-show="detectionLoading" x-cloak class="flex items-center gap-2">
                    <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                    Running...
                </span>
            </button>
        </div>
    </div>
</div>
