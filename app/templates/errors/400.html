<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>400 — Bad Request</title>
    <style>
        :root { color-scheme:light; --background:#fff; --foreground:#0f172a; --muted-foreground:#64748b; --input:#e2e8f0; --primary:#0f172a; --primary-foreground:#fff; --accent:#f8fafc; --warn:rgb(245,158,11); --warn-soft:rgba(245,158,11,.1); --ring:rgba(15,23,42,.18) }
        @media(prefers-color-scheme:dark){ :root{ --background:#0f172a; --foreground:#f8fafc; --muted-foreground:#94a3b8; --input:#1e293b; --primary:#f8fafc; --primary-foreground:#0f172a; --accent:#1e293b; --warn:rgb(251,191,36); --warn-soft:rgba(251,191,36,.15); --ring:rgba(248,250,252,.18) } }
        *{box-sizing:border-box} body{margin:0;min-height:100vh;background:var(--background);color:var(--foreground);font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif}
        main{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:1rem}
        .wrap{width:100%;max-width:32rem;text-align:center}
        .icon-wrap{width:5rem;height:5rem;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;border-radius:9999px;background:var(--warn-soft)}
        .icon{width:2.5rem;height:2.5rem;color:var(--warn)}
        .code{margin:0 0 .5rem;font-size:clamp(4.5rem,14vw,6rem);line-height:1;font-weight:800;letter-spacing:-.04em}
        .title{margin:0 0 .75rem;font-size:1.5rem;line-height:1.25;font-weight:600} .copy{margin:0 0 2rem;color:var(--muted-foreground);line-height:1.7}
        .actions{display:flex;flex-direction:column;gap:.75rem;justify-content:center}
        .button{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:.375rem;border:1px solid transparent;padding:.625rem 1.25rem;font-size:.875rem;font-weight:500;text-decoration:none;cursor:pointer;transition:background-color .15s,border-color .15s,color .15s}
        .button:focus-visible{outline:none;box-shadow:0 0 0 2px var(--ring)} .button-primary{background:var(--primary);color:var(--primary-foreground)} .button-primary:hover{opacity:.9}
        .button-secondary{border-color:var(--input);background:var(--background);color:var(--foreground)} .button-secondary:hover{background:var(--accent)}
        .button-icon{width:1rem;height:1rem;flex:0 0 auto} @media(min-width:640px){.actions{flex-direction:row}}
    </style>
</head>
<body>
    <main>
        <div class="wrap">
            <div class="icon-wrap" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle><path d="M12 8v4"></path><path d="M12 16h.01"></path>
                </svg>
            </div>
            <h1 class="code">400</h1>
            <h2 class="title">Bad Request</h2>
            <p class="copy">The request couldn't be processed. Please check your input and try again.</p>
            <div class="actions">
                <button id="btn-go-back-400" type="button" class="button button-primary">
                    <svg viewBox="0 0 24 24" class="button-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>
                    Go Back
                </button>
                <a href="/" class="button button-secondary">
                    <svg viewBox="0 0 24 24" class="button-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7"></path><path d="M9 22V12h6v10"></path></svg>
                    Dashboard
                </a>
            </div>
        </div>
    </main>
    <script nonce="{{ csp_nonce }}">document.getElementById('btn-go-back-400').addEventListener('click', function(){ history.back(); });</script>
</body>
</html>
