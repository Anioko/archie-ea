<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 — Page Not Found</title>
    <style>
        :root {
            color-scheme: light;
            --background: #ffffff;
            --foreground: #0f172a;
            --muted-foreground: #64748b;
            --border: #e2e8f0;
            --input: #e2e8f0;
            --primary: #0f172a;
            --primary-foreground: #ffffff;
            --accent: #f8fafc;
            --ring: rgba(15, 23, 42, 0.18);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --background: #0f172a;
                --foreground: #f8fafc;
                --muted-foreground: #94a3b8;
                --border: #1e293b;
                --input: #1e293b;
                --primary: #f8fafc;
                --primary-foreground: #0f172a;
                --accent: #1e293b;
                --ring: rgba(248, 250, 252, 0.18);
            }
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh;
            background: var(--background); color: var(--foreground);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        main {
            min-height: 80vh; display: flex; align-items: center; justify-content: center; padding: 1rem;
        }
        .wrap { width: 100%; max-width: 32rem; text-align: center; }
        .icon-wrap {
            width: 5rem; height: 5rem; margin: 0 auto 1.5rem;
            display: flex; align-items: center; justify-content: center;
            border-radius: 9999px; background: rgba(100, 116, 139, 0.1);
        }
        .icon { width: 2.5rem; height: 2.5rem; color: var(--muted-foreground); }
        .code {
            margin: 0 0 0.5rem; font-size: clamp(4.5rem, 14vw, 6rem);
            line-height: 1; font-weight: 800; letter-spacing: -0.04em;
        }
        .title { margin: 0 0 0.75rem; font-size: 1.5rem; line-height: 1.25; font-weight: 600; }
        .copy { margin: 0 0 2rem; color: var(--muted-foreground); line-height: 1.7; }
        .actions { display: flex; flex-direction: column; gap: 0.75rem; justify-content: center; }
        .button {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            border-radius: 0.375rem; border: 1px solid transparent;
            padding: 0.625rem 1.25rem; font-size: 0.875rem; font-weight: 500;
            text-decoration: none; cursor: pointer;
            transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
        }
        .button:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--ring); }
        .button-primary { background: var(--primary); color: var(--primary-foreground); }
        .button-primary:hover { opacity: 0.9; }
        .button-secondary { border-color: var(--input); background: var(--background); color: var(--foreground); }
        .button-secondary:hover { background: var(--accent); }
        .button-icon { width: 1rem; height: 1rem; flex: 0 0 auto; }
        @media (min-width: 640px) { .actions { flex-direction: row; } }
    </style>
</head>
<body>
    <main id="main-content">
        <div class="wrap">
            <div class="icon-wrap" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m13 3 3 3-3 3"></path><path d="M2 12h13l-3-3"></path>
                    <path d="m2 6 3-3 3 3"></path><path d="M22 12H9l3 3"></path>
                </svg>
            </div>

            <h1 class="code">404</h1>
            <h2 class="title">Page Not Found</h2>

            <p class="copy">
                The page you're looking for doesn't exist. It may have been moved,
                deleted, or you may have followed a broken link.
            </p>

            <div class="actions">
                <a href="/" class="button button-primary">
                    <svg viewBox="0 0 24 24" class="button-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="m3 9 9-7 9 7"></path><path d="M9 22V12h6v10"></path>
                    </svg>
                    Go to Dashboard
                </a>
                <button id="btn-go-back-404" type="button" class="button button-secondary" aria-label="Go back">
                    <svg viewBox="0 0 24 24" class="button-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path>
                    </svg>
                    Go Back
                </button>
            </div>
        </div>
    </main>
    <script nonce="{{ csp_nonce }}">document.getElementById('btn-go-back-404').addEventListener('click', function(){ history.back(); });</script>
</body>
</html>
