{% macro password_check(field, level) %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.2.0/zxcvbn.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const submitBtn = document.getElementById('submit');
    const passwordField = document.getElementById('{{ field }}');
    
    if (!passwordField) {
      if (submitBtn) submitBtn.disabled = false;
      return;
    }
    
    if (submitBtn && !passwordField.value) submitBtn.disabled = true;

    // Fallback: if zxcvbn fails to load, don't block submission
    if (typeof zxcvbn === 'undefined') {
      if (submitBtn) submitBtn.disabled = false;
      return;
    }

    // Create progress meter
    const progress = document.createElement('progress');
    progress.value = 0;
    progress.max = 4;
    progress.id = 'password-strength-meter';
    passwordField.parentNode.insertBefore(progress, passwordField.nextSibling);
    
    // Create text indicator
    const textIndicator = document.createElement('p');
    textIndicator.id = 'password-strength-text';
    textIndicator.className = 'text-sm text-muted-foreground mt-2';
    progress.parentNode.insertBefore(textIndicator, progress.nextSibling);
    
    const strength = {
      0: "Bad",
      1: "Okay",
      2: "Good",
      3: "Very Good",
      4: "Strong"
    };
    
    function checkPassword() {
      const val = passwordField.value;
      if (typeof zxcvbn === 'undefined') { if (submitBtn) submitBtn.disabled = false; return; }
      const result = zxcvbn(val);
      
      // Update the password strength meter
      progress.value = result.score;
      
      // Enable/disable submit button
      if (result.score >= {{ level }} && submitBtn) {
        submitBtn.disabled = false;
      } else if (submitBtn) {
        submitBtn.disabled = true;
      }
      
      // Update the text indicator
      if (val !== "") {
        textIndicator.textContent = "Strength: " + strength[result.score];
      } else {
        textIndicator.textContent = "";
      }
    }
    passwordField.addEventListener('keyup', checkPassword);
    passwordField.addEventListener('input', checkPassword);
    passwordField.addEventListener('change', checkPassword);
    // Run once on load in case field is pre-filled
    if (passwordField.value) checkPassword();
  });
</script>
<style>
  progress {
    /* Reset the default appearance */
    -webkit-appearance: none;
       -moz-appearance: none;
            appearance: none;

    margin: 10px auto 1em;
    width: 100%;
    height: 0.5em;
    background-color: rgba(0, 0, 0, 0.1);
    border-radius: 0.25rem;
  }

  /* Chrome */
  progress::-webkit-progress-value {
    background: rgba(0, 0, 0, 0.1); 
    border-radius: 0.25rem;
  }
  
  progress::-webkit-progress-bar {
    background-color: rgba(0, 0, 0, 0.1);
    border-radius: 0.25rem;
  }

   /* Webkit based browsers */
  progress[value="1"]::-webkit-progress-value { background-color: hsl(var(--destructive)); }
  progress[value="2"]::-webkit-progress-value { background-color: hsl(var(--warning)); }
  progress[value="3"]::-webkit-progress-value { background-color: hsl(var(--warning)); }
  progress[value="4"]::-webkit-progress-value { background-color: hsl(var(--success)); }

  /* Gecko based browsers */
  progress[value="1"]::-moz-progress-bar { background-color: hsl(var(--destructive)); }
  progress[value="2"]::-moz-progress-bar { background-color: hsl(var(--warning)); }
  progress[value="3"]::-moz-progress-bar { background-color: hsl(var(--warning)); }
  progress[value="4"]::-moz-progress-bar { background-color: hsl(var(--success)); }
</style>

{% endmacro %}
