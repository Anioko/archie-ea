<div class="bg-background rounded-lg shadow-sm border border-border p-4">
    <h3 class="text-lg font-semibold text-foreground mb-4">Generated Code</h3>

    <div id="resultsContainer">
        <div class="text-center py-12">
            <svg class="mx-auto h-16 w-16 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
            </svg>
            <p class="text-muted-foreground mt-4">No code generated yet</p>
            <p class="text-sm text-muted-foreground mt-2">Configure settings and click "Generate Code" to start</p>
        </div>
    </div>

    <!-- Results Actions -->
    <div id="resultsActions" class="mt-4 pt-4 border-t border-border hidden">
        <div class="flex space-x-2">
            <button @click="downloadAllCode()" class="flex-1 px-4 py-2 text-sm bg-muted-foreground text-primary-foreground rounded-lg hover:bg-foreground/80 transition-colors" aria-label="Action">
                Download All
            </button>
            <button @click="clearResults()" class="px-4 py-2 text-sm bg-muted text-foreground/80 rounded-lg hover:bg-muted transition-colors" aria-label="Action">
                Clear
            </button>
        </div>
    </div>
</div>

<script>
function downloadAllCode() {
    if (!window.codeArtifacts || window.codeArtifacts.length === 0) {
        showNotification('No code to download', 'error');
        return;
    }

    // Create a zip-like structure (simple concatenation for now)
    let allCode = '';
    window.codeArtifacts.forEach(artifact => {
        allCode += `\n\n// ========== ${artifact.name} ==========\n\n`;
        allCode += artifact.content;
    });

    const blob = new Blob([allCode], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'generated_code_all.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showNotification('All code downloaded', 'success');
}

function clearResults() {
    const resultsContainer = document.getElementById('resultsContainer');
    resultsContainer.innerHTML = `
        <div class="text-center py-12">
            <svg class="mx-auto h-16 w-16 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
            </svg>
            <p class="text-muted-foreground mt-4">No code generated yet</p>
            <p class="text-sm text-muted-foreground mt-2">Configure settings and click "Generate Code" to start</p>
        </div>
    `;

    document.getElementById('resultsActions').classList.add('hidden');
    window.codeArtifacts = [];
}
</script>
