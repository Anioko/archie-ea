{# Conflict Resolution Partial - Duplicate handling UI #}
{# Included in job_detail.html when show_preview is True #}

<!-- Conflict Resolution Section -->
<div x-show="previewData && (previewData?.duplicates?.length || 0) > 0" x-cloak class="rounded-lg border bg-card text-card-foreground shadow-sm">
    <div class="p-6">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center gap-3">
                <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-warning">
                    <i data-lucide="git-compare" class="h-5 w-5 text-primary-foreground"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold">Duplicate Conflicts</h3>
                    <p class="text-sm text-muted-foreground">
                        <span x-text="previewData?.duplicates?.length || 0"></span> potential duplicate(s) found
                    </p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button
                    @click="resolveAllAsNew()"
                    class="inline-flex items-center justify-center rounded-md text-sm font-medium border border-input bg-background hover:bg-accent hover:text-accent-foreground h-9 px-3 py-1 transition-colors"
                 aria-label="Action">
                    Resolve All as New
                </button>
                <button
                    @click="saveResolutions()"
                    :disabled="Object.keys(resolutions).length === 0"
                    class="inline-flex items-center justify-center rounded-md text-sm font-medium bg-success text-primary-foreground hover:bg-success disabled:opacity-50 h-9 px-3 py-1 transition-colors"
                 aria-label="Save">
                    <i data-lucide="save" class="mr-1 h-4 w-4"></i>
                    Save Resolutions
                </button>
            </div>
        </div>

        <!-- Conflict Cards -->
        <div class="space-y-4">
            <template x-for="conflict in (previewData?.duplicates || [])" :key="conflict.import_row">
                <div class="rounded-lg border p-4">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                        <!-- Import Row (Left) -->
                        <div class="rounded-md bg-primary/5 dark:bg-primary/20 p-3">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="inline-flex items-center rounded-full bg-primary/10 text-primary px-2 py-0.5 text-xs font-medium">Import</span>
                                <span class="text-xs text-muted-foreground">Row #<span x-text="conflict.import_row"></span></span>
                            </div>
                            <p class="font-medium text-sm" x-text="conflict.import_name"></p>
                            <p class="text-xs text-muted-foreground mt-1 line-clamp-2" x-text="conflict.import_description || 'No description'"></p>
                            <p x-show="conflict.import_type" x-cloak class="text-xs text-muted-foreground mt-1">
                                Type: <span x-text="conflict.import_type"></span>
                            </p>
                        </div>

                        <!-- Best Match (Right) -->
                        <div class="rounded-md bg-warning/5 dark:bg-warning/20 p-3">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="inline-flex items-center rounded-full bg-warning/10 text-warning px-2 py-0.5 text-xs font-medium">Existing</span>
                                <span
                                    :class="{
                                        'bg-success/10 text-success': conflict.matches[0]?.similarity >= 0.8,
                                        'bg-warning/10 text-warning': conflict.matches[0]?.similarity >= 0.6 && conflict.matches[0]?.similarity < 0.8
                                    }"
                                    class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium"
                                    x-text="Math.round((conflict.matches[0]?.similarity || 0) * 100) + '% match'"
                                ></span>
                            </div>
                            <p class="font-medium text-sm" x-text="conflict.matches[0]?.app_name"></p>
                            <p class="text-xs text-muted-foreground mt-1 line-clamp-2" x-text="conflict.matches[0]?.app_description || 'No description'"></p>
                            <p class="text-xs text-muted-foreground mt-1">
                                Status: <span x-text="conflict.matches[0]?.app_status || 'Unknown'"></span>
                            </p>
                            <!-- Additional matches -->
                            <p x-show="conflict.matches.length > 1" x-cloak class="text-xs text-muted-foreground mt-2">
                                + <span x-text="conflict.matches.length - 1"></span> more match(es)
                            </p>
                        </div>
                    </div>

                    <!-- Resolution Options -->
                    <div class="mt-3 pt-3 border-t flex flex-wrap items-center gap-4">
                        <span class="text-xs font-medium text-muted-foreground">Resolution:</span>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input
                                type="radio"
                                :name="'resolution_' + conflict.import_row"
                                value="create_new"
                                @change="resolutions[conflict.import_row] = {import_row: conflict.import_row, action: 'create_new', target_app_id: null}"
                                :checked="resolutions[conflict.import_row]?.action === 'create_new'"
                                class="h-4 w-4 text-primary"
                             aria-label="'Resolution ' + Conflict.Import Row"/>
                            <span class="text-sm">Create New</span>
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input
                                type="radio"
                                :name="'resolution_' + conflict.import_row"
                                value="skip"
                                @change="resolutions[conflict.import_row] = {import_row: conflict.import_row, action: 'skip', target_app_id: conflict.matches[0]?.app_id}"
                                :checked="resolutions[conflict.import_row]?.action === 'skip'"
                                class="h-4 w-4 text-warning"
                             aria-label="'Resolution ' + Conflict.Import Row"/>
                            <span class="text-sm">Skip (Use Existing)</span>
                        </label>
                        <label class="flex items-center gap-1.5 cursor-pointer">
                            <input
                                type="radio"
                                :name="'resolution_' + conflict.import_row"
                                value="update"
                                @change="resolutions[conflict.import_row] = {import_row: conflict.import_row, action: 'update', target_app_id: conflict.matches[0]?.app_id}"
                                :checked="resolutions[conflict.import_row]?.action === 'update'"
                                class="h-4 w-4 text-success"
                             aria-label="'Resolution ' + Conflict.Import Row"/>
                            <span class="text-sm">Update Existing</span>
                        </label>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<!-- No Conflicts State -->
<div x-show="previewData && (previewData?.duplicates?.length || 0) === 0 && !previewLoading" x-cloak
     class="rounded-lg border bg-card text-card-foreground shadow-sm">
    <div class="p-6 text-center">
        <div class="flex h-12 w-12 mx-auto items-center justify-center rounded-full bg-success/10">
            <i data-lucide="check-circle" class="h-6 w-6 text-success"></i>
        </div>
        <p class="mt-3 text-sm font-medium text-success">No duplicate conflicts detected</p>
        <p class="text-xs text-muted-foreground mt-1">All imported applications appear to be new records</p>
    </div>
</div>
