version: '3.4'
services:
  server:
    build:
      context: .
    ports:
      - '5000:5000'
    volumes:
      - './:/app'
    environment:
      # Database URLs - separate databases for dev and test
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie
      DEV_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie
      TEST_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie_test
      REDISTOGO_URL: http://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      dockerfile: Dockerfile.worker
      context: .
    volumes:
      - './:/app'
    environment:
      # Database URLs - separate databases for dev and test
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie
      DEV_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie
      TEST_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie_test
      REDISTOGO_URL: http://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      # Init script creates flask_dev and flask_test databases on startup
      - ./scripts/database/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    depends_on:
      - postgres

  redis:
    image: redis:6-alpine
    ports:
      - '6379:6379'

volumes:
  db-data:
