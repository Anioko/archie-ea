version: '3.4'
services:
  server:
    build:
      context: .
    # Create the schema (idempotent, non-destructive) before starting the web server.
    # Without this, `docker compose up` boots gunicorn against an empty database and
    # every request fails with "relation does not exist".
    command: sh -c "flask --app manage init-db && gunicorn -c gunicorn.conf.py manage:app"
    ports:
      - '5000:5000'
    volumes:
      - './:/app'
    environment:
      # Database URLs - separate databases for dev and test
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie
      DEV_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie
      TEST_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie_test
      REDISTOGO_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      dockerfile: Dockerfile.worker
      context: .
    volumes:
      - './:/app'
    environment:
      # Database URLs - separate databases for dev and test
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie
      DEV_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie
      TEST_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/archie_test
      REDISTOGO_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
      # Init script creates flask_dev and flask_test databases on startup
      - ./scripts/database/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    ports:
      # Bind to loopback only — the app reaches Postgres over the internal Docker
      # network (host 'postgres'), so this never needs to be public. Publishing on
      # 0.0.0.0 exposed the DB to the internet (Shadowserver/DO security finding).
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      # Adminer is a DB admin UI — loopback only (reach it via an SSH tunnel), never public.
      - '127.0.0.1:8080:8080'
    depends_on:
      - postgres

  redis:
    image: redis:6-alpine
    ports:
      # Loopback only — the app uses Redis over the Docker network (host 'redis').
      # Publishing on 0.0.0.0 left Redis open to the internet on 6379 (the security finding).
      - '127.0.0.1:6379:6379'

volumes:
  db-data:
